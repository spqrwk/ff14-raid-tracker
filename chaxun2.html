<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FF Logs 初通队友次数对比</title>
  <style>
    :root {
      --bg: #eef2f6;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --ink: #18202a;
      --muted: #647181;
      --line: #d8e0ea;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --blue: #2f6eb8;
      --amber: #b7791f;
      --red: #bd3b36;
      --green: #15803d;
      --shadow: 0 8px 24px rgba(24, 32, 42, 0.07);
      --shadow-small: 0 1px 2px rgba(24, 32, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f7f9fc 0, var(--bg) 360px, #edf1f5 100%);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 750;
      letter-spacing: 0;
    }

    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 18px 20px 32px;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      text-align: right;
      font-size: 13px;
      overflow-wrap: anywhere;
      padding: 6px 10px;
      border: 1px solid #e1e7ef;
      border-radius: 999px;
      background: #f8fafc;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .panel-title {
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      background: linear-gradient(180deg, #ffffff, #fbfcfe);
    }

    .panel-body {
      padding: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid #c8d2dd;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 124, 107, 0.12);
    }

    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }
    .span-6 { grid-column: span 6; }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid #b8c2cf;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      border-color: #8793a1;
      background: #f9fafb;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      box-shadow: 0 6px 16px rgba(15, 118, 110, 0.18);
    }

    button.primary:hover:not(:disabled) {
      background: var(--accent-strong);
    }

    button.danger {
      border-color: #e0a8a6;
      color: var(--red);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 13px;
      min-height: 78px;
      box-shadow: var(--shadow-small);
    }

    .metric.warning {
      border-color: #e6c66f;
      background: #fffaf0;
    }

    .metric.danger {
      border-color: #e5a0a0;
      background: #fff5f5;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 23px;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }

    .table-controls {
      display: grid;
      grid-template-columns: 2fr repeat(3, minmax(130px, 1fr)) auto;
      gap: 10px;
      align-items: end;
      padding: 12px 14px;
      background: #fbfcfe;
      border-bottom: 1px solid var(--line);
    }

    .table-wrap {
      overflow: auto;
      max-height: 560px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1180px;
      background: #fff;
    }

    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid #e5e9ef;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #f3f6fa;
      color: #3e4650;
      font-size: 12px;
      z-index: 1;
    }

    td.wrap {
      white-space: normal;
      min-width: 170px;
    }

    .sort-btn {
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .sort-btn:hover {
      color: var(--accent);
      background: transparent;
    }

    .sort-indicator {
      color: var(--accent);
      font-size: 11px;
      min-width: 10px;
      display: inline-block;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid #ccd4dd;
      background: #f9fafb;
    }

    .pill.green {
      color: var(--green);
      border-color: #9fd2b3;
      background: #eef9f2;
    }

    .pill.blue {
      color: var(--blue);
      border-color: #abc1e6;
      background: #f1f6ff;
    }

    .pill.red {
      color: var(--red);
      border-color: #e9b5b3;
      background: #fff2f1;
    }

    .log, .query-text {
      max-height: 180px;
      overflow: auto;
      padding: 10px 12px;
      margin: 0;
      background: #101418;
      color: #d9e2ec;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .query-text {
      max-height: 360px;
    }

    @media (max-width: 980px) {
      .form-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .span-2, .span-3, .span-4 {
        grid-column: span 3;
      }

      .span-6 {
        grid-column: span 6;
      }

      .cards {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .table-controls {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }

      .form-grid, .table-controls {
        grid-template-columns: 1fr;
      }

      .span-2, .span-3, .span-4, .span-6 {
        grid-column: span 1;
      }

      .cards {
        grid-template-columns: 1fr 1fr;
      }

      .actions {
        width: 100%;
      }

      button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>FF Logs 初通队友次数对比</h1>
      <div class="status" id="status">就绪</div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel-title">
        <span>查询参数</span>
        <div class="actions">
          <button id="saveCredentialsBtn" type="button">保存凭证</button>
          <button id="refreshRateBtn" type="button">刷新额度</button>
          <button id="clearCredentialsBtn" class="danger" type="button">清除凭证</button>
        </div>
      </div>
      <div class="panel-body">
        <div class="form-grid">
          <div class="span-3">
            <label for="clientId">Client ID</label>
            <input id="clientId" autocomplete="off">
          </div>
          <div class="span-3">
            <label for="clientSecret">Client Secret</label>
            <input id="clientSecret" type="password" autocomplete="off">
          </div>
          <div class="span-6">
            <label for="manualToken">访问令牌</label>
            <input id="manualToken" type="password" autocomplete="off">
            <div class="hint">凭证只保存在当前浏览器 localStorage；页面可以直接用 file:// 打开。</div>
          </div>

          <div class="span-2">
            <label for="characterId">角色ID</label>
            <input id="characterId" type="number" placeholder="可选">
          </div>
          <div class="span-3">
            <label for="characterName">玩家名</label>
            <input id="characterName" placeholder="不用ID时必填">
          </div>
          <div class="span-3">
            <label for="serverSlug">服务器</label>
            <input id="serverSlug" placeholder="不用ID时必填">
          </div>
          <div class="span-2">
            <label for="serverRegion">区域</label>
            <input id="serverRegion" value="CN">
          </div>
          <div class="span-2">
            <label for="encounterId">Boss ID</label>
            <input id="encounterId" type="number" value="1085">
          </div>

          <div class="span-3">
            <label for="afterMs">起始时间戳</label>
            <input id="afterMs" type="number" value="1780394400000">
          </div>
          <div class="span-2">
            <label for="limit">分页数量</label>
            <input id="limit" type="number" min="1" max="100" value="40">
          </div>
          <div class="span-2">
            <label for="maxPages">最多页数</label>
            <input id="maxPages" type="number" value="0">
          </div>
          <div class="span-2">
            <label for="dedupeMs">去重窗口(ms)</label>
            <input id="dedupeMs" type="number" value="5000">
          </div>
          <div class="span-2">
            <label for="workers">并发队友数</label>
            <input id="workers" type="number" min="1" max="7" value="2">
          </div>
          <div class="span-6">
            <label>&nbsp;</label>
            <div class="actions">
              <button id="runBtn" class="primary" type="button">开始查询</button>
              <button id="stopBtn" type="button" disabled>停止</button>
              <button id="downloadJsonBtn" type="button" disabled>下载 JSON</button>
              <button id="downloadCsvBtn" type="button" disabled>下载 CSV</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="cards">
      <div class="metric">
        <div class="metric-label">目标玩家</div>
        <div class="metric-value" id="targetValue">-</div>
        <div class="metric-sub" id="targetMeta">-</div>
      </div>
      <div class="metric">
        <div class="metric-label">目标初通</div>
        <div class="metric-value" id="firstClearValue">-</div>
        <div class="metric-sub" id="firstClearMeta">-</div>
      </div>
      <div class="metric">
        <div class="metric-label">队友数</div>
        <div class="metric-value" id="teammateCount">0</div>
        <div class="metric-sub">排除本人、LB、NPC、Pet</div>
      </div>
      <div class="metric">
        <div class="metric-label">此前通关合计</div>
        <div class="metric-value" id="previousTotal">0</div>
        <div class="metric-sub">目标初通窗口之前</div>
      </div>
      <div class="metric">
        <div class="metric-label">当前通关合计</div>
        <div class="metric-value" id="currentTotal">0</div>
        <div class="metric-sub">队友当前去重总数</div>
      </div>
      <div class="metric" id="rateLimitCard">
        <div class="metric-label">API额度</div>
        <div class="metric-value" id="rateLimitValue">-</div>
        <div class="metric-sub" id="rateLimitMeta">未查询</div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">
        <span>队友对比</span>
        <span id="tableMeta">0 行</span>
      </div>
      <div class="table-controls">
        <div>
          <label for="tableSearch">搜索</label>
          <input id="tableSearch" placeholder="姓名、服务器、职业、报告ID">
        </div>
        <div>
          <label for="sortField">排序字段</label>
          <select id="sortField">
            <option value="order">初通队伍顺序</option>
            <option value="name">姓名</option>
            <option value="serverName">服务器</option>
            <option value="previousClearCount">此前通关次数</option>
            <option value="sameClearWindowCount">同场记录数</option>
            <option value="afterTargetFirstClearCount">此后新增次数</option>
            <option value="currentClearCount">当前通关次数</option>
          </select>
        </div>
        <div>
          <label for="sortDirection">方向</label>
          <select id="sortDirection">
            <option value="asc">升序</option>
            <option value="desc">降序</option>
          </select>
        </div>
        <div>
          <label for="onlyErrors">显示</label>
          <select id="onlyErrors">
            <option value="all">全部</option>
            <option value="errors">仅错误</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="clearTableFiltersBtn" type="button">重置</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><button class="sort-btn" type="button" data-sort="order">#<span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" type="button" data-sort="name">姓名<span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" type="button" data-sort="serverName">服务器<span class="sort-indicator"></span></button></th>
              <th>职业</th>
              <th>角色ID</th>
              <th><button class="sort-btn" type="button" data-sort="previousClearCount">此前<span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" type="button" data-sort="sameClearWindowCount">同场<span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" type="button" data-sort="afterTargetFirstClearCount">此后<span class="sort-indicator"></span></button></th>
              <th><button class="sort-btn" type="button" data-sort="currentClearCount">当前<span class="sort-indicator"></span></button></th>
              <th>首次通关</th>
              <th>最近通关</th>
              <th class="wrap">备注</th>
            </tr>
          </thead>
          <tbody id="teammateRows"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">GraphQL 查询语句</div>
      <div class="panel-body">
        <pre class="query-text" id="queryText"></pre>
      </div>
    </section>

    <section class="panel">
      <div class="panel-title">运行日志</div>
      <div class="panel-body">
        <pre class="log" id="log"></pre>
      </div>
    </section>
  </main>

  <script>
    const API_URL = "https://www.fflogs.com/api/v2/client";
    const TOKEN_URL = "https://www.fflogs.com/oauth/token";
    const STORE_KEY = "fflogs-static-dashboard-v1";

    const CLEAR_REPORTS_BY_ID_QUERY = `
query($characterID: Int!, $encounterID: Int!, $limit: Int!, $page: Int!) {
  characterData {
    character(id: $characterID) {
      id
      name
      server { name slug }
      recentReports(limit: $limit, page: $page) {
        data {
          code
          title
          startTime
          endTime
          masterData {
            actors { id name server type subType }
          }
          fights(encounterID: $encounterID, killType: Kills) {
            id
            name
            startTime
            endTime
            fightPercentage
            lastPhase
            friendlyPlayers
          }
        }
      }
    }
  }
}`;

    const CLEAR_REPORTS_BY_NAME_QUERY = `
query(
  $characterName: String!,
  $serverSlug: String!,
  $serverRegion: String!,
  $encounterID: Int!,
  $limit: Int!,
  $page: Int!
) {
  characterData {
    character(name: $characterName, serverSlug: $serverSlug, serverRegion: $serverRegion) {
      id
      name
      server { name slug }
      recentReports(limit: $limit, page: $page) {
        data {
          code
          title
          startTime
          endTime
          masterData {
            actors { id name server type subType }
          }
          fights(encounterID: $encounterID, killType: Kills) {
            id
            name
            startTime
            endTime
            fightPercentage
            lastPhase
            friendlyPlayers
          }
        }
      }
    }
  }
}`;

    const FIRST_CLEAR_DETAIL_QUERY = `
query($code: String!, $encounterID: Int!, $fightIDs: [Int]) {
  reportData {
    report(code: $code) {
      code
      title
      startTime
      endTime
      masterData {
        actors {
          id
          name
          server
          type
          subType
          gameID
        }
      }
      rankedCharacters {
        id
        name
        server {
          name
          slug
          region { name slug }
        }
      }
      fights(encounterID: $encounterID, fightIDs: $fightIDs, killType: Kills) {
        id
        name
        kill
        startTime
        endTime
        fightPercentage
        lastPhase
        friendlyPlayers
      }
    }
  }
}`;

    const RATE_LIMIT_QUERY = `
query {
  rateLimitData {
    limitPerHour
    pointsSpentThisHour
    pointsResetIn
  }
}`;

    const QUERIES = {
      "按角色ID分页查询通关战斗": CLEAR_REPORTS_BY_ID_QUERY,
      "按角色名和服务器分页查询通关战斗": CLEAR_REPORTS_BY_NAME_QUERY,
      "查询初通日志队友映射": FIRST_CLEAR_DETAIL_QUERY,
      "查询API额度": RATE_LIMIT_QUERY
    };

    const state = {
      token: "",
      abortController: null,
      target: null,
      targetRawClears: [],
      targetClears: [],
      targetFirstClear: null,
      firstClearReport: null,
      firstClearPlayers: [],
      teammates: [],
      result: null,
      rateLimit: null,
      tableSort: {
        key: "order",
        direction: "asc"
      }
    };

    const $ = (id) => document.getElementById(id);

    function setStatus(text) {
      $("status").textContent = text;
    }

    function log(text) {
      const node = $("log");
      const time = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      node.textContent += `[${time}] ${text}\n`;
      node.scrollTop = node.scrollHeight;
    }

    function clearLog() {
      $("log").textContent = "";
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function requestJson(url, options, retries = 3) {
      for (let attempt = 1; attempt <= retries; attempt += 1) {
        try {
          const response = await fetch(url, {
            ...options,
            signal: state.abortController ? state.abortController.signal : undefined
          });
          const text = await response.text();
          let payload = null;
          try {
            payload = text ? JSON.parse(text) : {};
          } catch {
            throw new Error(`响应不是 JSON：${text.slice(0, 180)}`);
          }
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${JSON.stringify(payload).slice(0, 300)}`);
          }
          return payload;
        } catch (error) {
          if (error.name === "AbortError") throw error;
          if (attempt < retries) {
            await sleep(800 * attempt);
            continue;
          }
          throw error;
        }
      }
    }

    async function getToken() {
      const manualToken = $("manualToken").value.trim();
      if (manualToken) return manualToken;

      const clientId = $("clientId").value.trim();
      const clientSecret = $("clientSecret").value.trim();
      if (!clientId || !clientSecret) {
        throw new Error("需要 Client ID 和 Client Secret，或手动填写访问令牌。");
      }

      const body = new URLSearchParams({ grant_type: "client_credentials" });
      const payload = await requestJson(TOKEN_URL, {
        method: "POST",
        headers: {
          Authorization: `Basic ${btoa(`${clientId}:${clientSecret}`)}`,
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body
      });
      if (!payload.access_token) throw new Error("没有获取到 access_token。");
      return payload.access_token;
    }

    async function graphQL(query, variables = {}) {
      const payload = await requestJson(API_URL, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${state.token}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ query, variables })
      });

      if (payload.errors && payload.errors.length) {
        const message = payload.errors.map((item) => item.message).join("\n");
        const error = new Error(message);
        error.isComplexity = message.includes("Max query complexity");
        throw error;
      }
      return payload.data;
    }

    function numberValue(id, fallback) {
      const value = Number($(id).value);
      return Number.isFinite(value) ? value : fallback;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function formatTime(ms) {
      if (ms == null) return "";
      return new Date(ms).toLocaleString("zh-CN", {
        hour12: false,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function formatResetIn(seconds) {
      const value = Math.max(0, Number(seconds) || 0);
      const minutes = Math.floor(value / 60);
      const rest = Math.floor(value % 60);
      return `${minutes}分${String(rest).padStart(2, "0")}秒`;
    }

    function pct(value) {
      return value == null || Number.isNaN(Number(value)) ? "-" : `${Number(value).toFixed(2)}%`;
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function renderRateLimit(rateLimit) {
      const card = $("rateLimitCard");
      card.classList.remove("warning", "danger");
      if (!rateLimit) {
        $("rateLimitValue").textContent = "-";
        $("rateLimitMeta").textContent = "未查询";
        return;
      }

      const limit = Number(rateLimit.limitPerHour) || 0;
      const spent = Number(rateLimit.pointsSpentThisHour) || 0;
      const remaining = Math.max(0, limit - spent);
      const percentRemaining = limit ? remaining / limit : 0;
      $("rateLimitValue").textContent = `${remaining}/${limit}`;
      $("rateLimitMeta").textContent = `已用 ${spent}，${formatResetIn(rateLimit.pointsResetIn)} 后重置`;

      if (remaining <= 100 || percentRemaining <= 0.1) {
        card.classList.add("danger");
        setStatus(`额度偏低：剩余 ${remaining}/${limit}`);
      } else if (remaining <= 500 || percentRemaining <= 0.25) {
        card.classList.add("warning");
      }
    }

    async function refreshRateLimit({ silent = false } = {}) {
      if (!state.token) state.token = await getToken();
      const data = await graphQL(RATE_LIMIT_QUERY);
      state.rateLimit = data.rateLimitData;
      renderRateLimit(state.rateLimit);
      if (!silent) {
        log(`额度：已用 ${state.rateLimit.pointsSpentThisHour}/${state.rateLimit.limitPerHour}，${formatResetIn(state.rateLimit.pointsResetIn)} 后重置。`);
      }
      return state.rateLimit;
    }

    function readArgs() {
      return {
        characterId: numberValue("characterId", 0) || null,
        characterName: $("characterName").value.trim(),
        serverSlug: $("serverSlug").value.trim(),
        serverRegion: $("serverRegion").value.trim() || "CN",
        encounterId: numberValue("encounterId", 1085),
        after: numberValue("afterMs", 1780394400000),
        limit: clamp(numberValue("limit", 40), 1, 100),
        maxPages: Math.max(0, numberValue("maxPages", 0)),
        dedupeMs: Math.max(0, numberValue("dedupeMs", 5000)),
        workers: clamp(numberValue("workers", 2), 1, 7)
      };
    }

    function targetSubject(args) {
      if (args.characterId) return { id: args.characterId };
      if (!args.characterName || !args.serverSlug) {
        throw new Error("需要角色ID，或同时填写玩家名和服务器。");
      }
      return {
        name: args.characterName,
        serverSlug: args.serverSlug,
        serverRegion: args.serverRegion
      };
    }

    function subjectLabel(subject) {
      if (subject.id) return `id=${subject.id}`;
      return `${subject.name}@${subject.serverSlug}`;
    }

    function buildCharacterPageQuery(subject, args, limit, page) {
      if (subject.id) {
        return {
          query: CLEAR_REPORTS_BY_ID_QUERY,
          variables: {
            characterID: subject.id,
            encounterID: args.encounterId,
            limit,
            page
          }
        };
      }
      return {
        query: CLEAR_REPORTS_BY_NAME_QUERY,
        variables: {
          characterName: subject.name,
          serverSlug: subject.serverSlug,
          serverRegion: subject.serverRegion || args.serverRegion,
          encounterID: args.encounterId,
          limit,
          page
        }
      };
    }

    function characterServerNames(character) {
      const server = character.server || {};
      return new Set([server.name, server.slug].filter(Boolean));
    }

    function targetActorIdsForReport(report, character) {
      const serverNames = characterServerNames(character);
      const actorIds = new Set();
      for (const actor of (report.masterData || {}).actors || []) {
        if (actor.type !== "Player") continue;
        if (actor.subType === "LimitBreak") continue;
        if (actor.name !== character.name) continue;
        if (!serverNames.has(actor.server)) continue;
        if (actor.id != null) actorIds.add(actor.id);
      }
      return actorIds;
    }

    function normalizeClear(report, fight, character, args, targetActorIds) {
      const friendlyPlayers = new Set(fight.friendlyPlayers || []);
      const hasTarget = Array.from(targetActorIds || []).some((actorId) => friendlyPlayers.has(actorId));
      if (!hasTarget) return null;

      const reportStart = Number(report.startTime);
      const realStart = reportStart + Number(fight.startTime);
      const realEnd = reportStart + Number(fight.endTime);
      if (args.after && realStart < args.after) return null;

      return {
        characterID: character.id,
        characterName: character.name,
        server: character.server,
        encounterID: args.encounterId,
        reportCode: report.code,
        reportTitle: report.title,
        reportStartTime: reportStart,
        reportEndTime: Number(report.endTime),
        fightID: fight.id,
        fightName: fight.name,
        relativeStartMs: Number(fight.startTime),
        relativeEndMs: Number(fight.endTime),
        realStartTime: realStart,
        realStartISO: formatTime(realStart),
        realEndTime: realEnd,
        realEndISO: formatTime(realEnd),
        durationMs: Number(fight.endTime) - Number(fight.startTime),
        fightPercentage: fight.fightPercentage,
        lastPhase: fight.lastPhase,
        friendlyPlayers: fight.friendlyPlayers || [],
        targetActorIDs: Array.from(targetActorIds)
      };
    }

    function chooseDuplicateWinner(group) {
      return group.slice().sort((a, b) => {
        const scoreA = [
          a.reportTitle === "Dancing Mad" ? 1 : 0,
          String(a.reportTitle || "").includes("Dancing Mad") ? 1 : 0,
          a.durationMs || 0,
          -a.realStartTime
        ];
        const scoreB = [
          b.reportTitle === "Dancing Mad" ? 1 : 0,
          String(b.reportTitle || "").includes("Dancing Mad") ? 1 : 0,
          b.durationMs || 0,
          -b.realStartTime
        ];
        for (let index = 0; index < scoreA.length; index += 1) {
          if (scoreA[index] !== scoreB[index]) return scoreB[index] - scoreA[index];
        }
        return 0;
      })[0];
    }

    function dedupeByRealStart(fights, windowMs) {
      if (!fights.length) return [];
      const sorted = fights.slice().sort((a, b) => a.realStartTime - b.realStartTime);
      const groups = [];
      let current = [sorted[0]];
      let groupStart = sorted[0].realStartTime;

      for (const fight of sorted.slice(1)) {
        if (fight.realStartTime - groupStart <= windowMs) {
          current.push(fight);
        } else {
          groups.push(current);
          current = [fight];
          groupStart = fight.realStartTime;
        }
      }
      groups.push(current);

      return groups.map((group) => {
        const selected = chooseDuplicateWinner(group);
        const winner = { ...selected };
        winner.duplicateCount = group.length;
        winner.duplicates = group
          .filter((item) => item !== selected)
          .map((item) => ({
            reportCode: item.reportCode,
            fightID: item.fightID,
            realStartTime: item.realStartTime,
            realStartISO: item.realStartISO
          }));
        return winner;
      }).sort((a, b) => a.realStartTime - b.realStartTime);
    }

    async function collectCharacterClears(subject, args) {
      let limit = args.limit;
      while (true) {
        try {
          const { character, raw } = await collectCharacterClearsWithLimit(subject, args, limit);
          const deduped = dedupeByRealStart(raw, args.dedupeMs);
          return { character, raw, deduped, effectiveLimit: limit };
        } catch (error) {
          if (!error.isComplexity || limit <= 1) throw error;
          const nextLimit = Math.max(1, Math.floor(limit / 2));
          log(`${subjectLabel(subject)} 复杂度超限，分页数量 ${limit} 调整为 ${nextLimit} 后重试。`);
          limit = nextLimit;
        }
      }
    }

    async function collectCharacterClearsWithLimit(subject, args, limit) {
      let character = null;
      const raw = [];
      let page = 1;

      while (true) {
        const request = buildCharacterPageQuery(subject, args, limit, page);
        const data = await graphQL(request.query, request.variables);
        character = data.characterData.character;
        if (!character) throw new Error(`没有找到角色：${subjectLabel(subject)}`);

        const reports = character.recentReports.data || [];
        if (!reports.length) {
          log(`${subjectLabel(subject)} page ${page}: 没有数据，停止。`);
          break;
        }

        const pageClears = [];
        let pageReportStart = Infinity;
        let pageReportEnd = 0;
        for (const report of reports) {
          pageReportStart = Math.min(pageReportStart, Number(report.startTime));
          pageReportEnd = Math.max(pageReportEnd, Number(report.endTime));
          const targetActorIds = targetActorIdsForReport(report, character);
          for (const fight of report.fights || []) {
            const normalized = normalizeClear(report, fight, character, args, targetActorIds);
            if (normalized) pageClears.push(normalized);
          }
        }

        raw.push(...pageClears);
        log(`${subjectLabel(subject)} page ${page}: 报告 ${reports.length}，通关 ${pageClears.length}，时间 ${formatTime(pageReportStart)} ~ ${formatTime(pageReportEnd)}`);

        if (reports.length < limit) break;
        if (args.after && pageReportEnd < args.after) break;
        if (args.maxPages && page >= args.maxPages) break;
        page += 1;
        await sleep(0);
      }

      return { character, raw };
    }

    async function queryFirstClearDetail(firstClear, args) {
      const data = await graphQL(FIRST_CLEAR_DETAIL_QUERY, {
        code: firstClear.reportCode,
        encounterID: args.encounterId,
        fightIDs: [firstClear.fightID]
      });
      const report = data.reportData.report;
      if (!report) throw new Error(`没有找到报告：${firstClear.reportCode}`);
      return report;
    }

    function rankedKey(name, serverName) {
      return `${name || ""}\u0000${serverName || ""}`;
    }

    function buildRankedCharacterMap(report) {
      const map = new Map();
      for (const character of report.rankedCharacters || []) {
        const server = character.server || {};
        map.set(rankedKey(character.name, server.name), character);
        map.set(rankedKey(character.name, server.slug), character);
      }
      return map;
    }

    function isRealPlayer(actor) {
      if (!actor) return false;
      if (actor.type !== "Player") return false;
      if (actor.subType === "LimitBreak") return false;
      if (actor.name === "Multiple Players" || actor.name === "Limit Break") return false;
      return Boolean(actor.server);
    }

    function teammateIdentity(player) {
      if (player.characterID) return `id:${player.characterID}`;
      return `name:${player.name}@${player.serverName}`;
    }

    function sameCharacter(player, targetCharacter) {
      if (player.characterID && player.characterID === targetCharacter.id) return true;
      const targetServer = targetCharacter.server || {};
      return player.name === targetCharacter.name
        && [targetServer.name, targetServer.slug].includes(player.serverName);
    }

    function extractPlayersFromFirstClear(report, fightId, targetCharacter, args) {
      const actors = new Map();
      for (const actor of (report.masterData || {}).actors || []) {
        if (actor.id != null) actors.set(actor.id, actor);
      }

      const rankedMap = buildRankedCharacterMap(report);
      const fight = (report.fights || []).find((item) => item.id === fightId);
      if (!fight) throw new Error(`报告 ${report.code} 内没有 fight=${fightId}`);

      const players = [];
      const seen = new Set();
      for (const actorId of fight.friendlyPlayers || []) {
        const actor = actors.get(actorId);
        if (!isRealPlayer(actor)) continue;

        const ranked = rankedMap.get(rankedKey(actor.name, actor.server));
        const rankedServer = (ranked || {}).server || {};
        const rankedRegion = rankedServer.region || {};
        const player = {
          actorID: actorId,
          characterID: (ranked || {}).id || null,
          name: actor.name,
          job: actor.subType,
          serverName: rankedServer.name || actor.server,
          serverSlug: rankedServer.slug || actor.server,
          serverRegion: rankedRegion.slug || args.serverRegion
        };
        const key = teammateIdentity(player);
        if (seen.has(key)) continue;
        seen.add(key);
        players.push(player);
      }

      const teammates = players
        .filter((player) => !sameCharacter(player, targetCharacter))
        .map((player, index) => ({ ...player, order: index + 1 }));
      return { fight, players, teammates };
    }

    async function countTeammateClears(teammate, args, targetFirstClearTime) {
      const subject = teammate.characterID
        ? { id: teammate.characterID }
        : {
            name: teammate.name,
            serverSlug: teammate.serverSlug,
            serverRegion: teammate.serverRegion || args.serverRegion
          };

      const { character, raw, deduped, effectiveLimit } = await collectCharacterClears(subject, args);
      const sameStart = targetFirstClearTime - args.dedupeMs;
      const sameEnd = targetFirstClearTime + args.dedupeMs;
      const previous = deduped.filter((item) => item.realStartTime < sameStart);
      const same = deduped.filter((item) => item.realStartTime >= sameStart && item.realStartTime <= sameEnd);
      const after = deduped.filter((item) => item.realStartTime > sameEnd);
      const firstClear = deduped[0] || null;
      const latestClear = deduped[deduped.length - 1] || null;

      return {
        ...teammate,
        resolvedCharacter: character,
        querySubject: subject,
        effectiveLimit,
        rawClearCount: raw.length,
        clearCount: deduped.length,
        previousClearCount: previous.length,
        sameClearWindowCount: same.length,
        afterTargetFirstClearCount: after.length,
        currentClearCount: deduped.length,
        firstClear,
        latestClear,
        clearRefs: deduped.map(clearRef),
        previousClearRefs: previous.map(clearRef),
        sameClearWindowRefs: same.map(clearRef),
        afterTargetFirstClearRefs: after.map(clearRef)
      };
    }

    function clearRef(item) {
      return {
        reportCode: item.reportCode,
        fightID: item.fightID,
        realStartTime: item.realStartTime,
        realStartISO: item.realStartISO,
        duplicateCount: item.duplicateCount || 1
      };
    }

    async function mapLimit(items, limit, iteratee) {
      const results = new Array(items.length);
      let next = 0;

      async function worker() {
        while (next < items.length) {
          const index = next;
          next += 1;
          results[index] = await iteratee(items[index], index);
        }
      }

      const workers = Array.from({ length: Math.min(limit, items.length) }, worker);
      await Promise.all(workers);
      return results;
    }

    function buildResult(args, target, targetRaw, targetClears, firstClear, firstReport, detailFight, firstClearPlayers, teammates) {
      return {
        target,
        encounterID: args.encounterId,
        after: args.after,
        dedupeWindowMs: args.dedupeMs,
        targetRawClearCount: targetRaw.length,
        targetClearCount: targetClears.length,
        targetFirstClear: firstClear,
        firstClearReport: {
          code: firstReport.code,
          title: firstReport.title,
          startTime: firstReport.startTime,
          endTime: firstReport.endTime
        },
        firstClearFight: detailFight,
        firstClearPlayers,
        teammates
      };
    }

    function renderSummary() {
      const target = state.target;
      const firstClear = state.targetFirstClear;
      const teammates = state.teammates || [];
      $("targetValue").textContent = target ? target.name : "-";
      $("targetMeta").textContent = target ? `${target.server.name} · ID ${target.id}` : "-";
      $("firstClearValue").textContent = firstClear ? formatTime(firstClear.realStartTime) : "-";
      $("firstClearMeta").textContent = firstClear ? `${firstClear.reportCode}#${firstClear.fightID}` : "-";
      $("teammateCount").textContent = teammates.length;
      $("previousTotal").textContent = teammates.reduce((sum, item) => sum + (Number(item.previousClearCount) || 0), 0);
      $("currentTotal").textContent = teammates.reduce((sum, item) => sum + (Number(item.currentClearCount) || 0), 0);
    }

    function sortValue(item, key) {
      switch (key) {
        case "order":
        case "previousClearCount":
        case "sameClearWindowCount":
        case "afterTargetFirstClearCount":
        case "currentClearCount":
          return item[key] == null ? Number.POSITIVE_INFINITY : Number(item[key]);
        default:
          return item[key] || "";
      }
    }

    function compareValues(a, b) {
      if (typeof a === "number" && typeof b === "number") return a - b;
      return String(a).localeCompare(String(b), "zh-CN", { numeric: true });
    }

    function getVisibleTeammates() {
      const search = $("tableSearch").value.trim().toLowerCase();
      const onlyErrors = $("onlyErrors").value;
      const key = state.tableSort.key;
      const direction = state.tableSort.direction === "desc" ? -1 : 1;

      return (state.teammates || [])
        .filter((item) => {
          if (onlyErrors === "errors" && !item.error) return false;
          if (!search) return true;
          const first = item.firstClear || {};
          const latest = item.latestClear || {};
          const haystack = [
            item.name,
            item.serverName,
            item.job,
            item.characterID,
            first.reportCode,
            first.fightID,
            latest.reportCode,
            latest.fightID,
            item.error
          ].join(" ").toLowerCase();
          return haystack.includes(search);
        })
        .sort((left, right) => {
          const result = compareValues(sortValue(left, key), sortValue(right, key));
          if (result !== 0) return result * direction;
          return (left.order - right.order) * direction;
        });
    }

    function updateSortControls() {
      $("sortField").value = state.tableSort.key;
      $("sortDirection").value = state.tableSort.direction;
      document.querySelectorAll(".sort-btn").forEach((button) => {
        const indicator = button.querySelector(".sort-indicator");
        if (!indicator) return;
        indicator.textContent = button.dataset.sort === state.tableSort.key
          ? (state.tableSort.direction === "asc" ? "▲" : "▼")
          : "";
      });
    }

    function renderTable() {
      updateSortControls();
      const visible = getVisibleTeammates();
      $("tableMeta").textContent = `${visible.length} / ${(state.teammates || []).length} 行`;
      $("teammateRows").innerHTML = visible.map((item) => {
        const first = item.firstClear || {};
        const latest = item.latestClear || {};
        const error = item.error ? `<span class="pill red">错误</span> ${escapeHtml(item.error)}` : "";
        const same = Number(item.sameClearWindowCount) > 0
          ? `<span class="pill green">${item.sameClearWindowCount}</span>`
          : `<span class="pill red">0</span>`;
        return `
          <tr>
            <td>${item.order}</td>
            <td>${escapeHtml(item.name)}</td>
            <td>${escapeHtml(item.serverName)}</td>
            <td>${escapeHtml(item.job || "")}</td>
            <td>${item.characterID || ""}</td>
            <td>${item.previousClearCount ?? "-"}</td>
            <td>${same}</td>
            <td>${item.afterTargetFirstClearCount ?? "-"}</td>
            <td>${item.currentClearCount ?? "-"}</td>
            <td>${first.realStartISO ? `${first.realStartISO}<br>${first.reportCode}#${first.fightID}` : ""}</td>
            <td>${latest.realStartISO ? `${latest.realStartISO}<br>${latest.reportCode}#${latest.fightID}` : ""}</td>
            <td class="wrap">${error}</td>
          </tr>
        `;
      }).join("");
    }

    function renderQueries() {
      $("queryText").textContent = Object.entries(QUERIES)
        .map(([name, query]) => `# ${name}\n${query.trim()}`)
        .join("\n\n");
    }

    function toCsvValue(value) {
      const text = value == null ? "" : String(value);
      return `"${text.replaceAll('"', '""')}"`;
    }

    function teammatesToCsv(items) {
      const headers = [
        "姓名",
        "服务器",
        "职业",
        "角色ID",
        "目标初通前已通关次数",
        "同场初通窗口记录数",
        "目标初通后新增通关次数",
        "当前去重通关次数",
        "原始通关记录数",
        "初次通关时间",
        "最近通关时间",
        "初次通关报告",
        "最近通关报告",
        "错误"
      ];
      const lines = [headers.map(toCsvValue).join(",")];
      for (const item of items) {
        const first = item.firstClear || {};
        const latest = item.latestClear || {};
        lines.push([
          item.name,
          item.serverName,
          item.job,
          item.characterID || "",
          item.previousClearCount,
          item.sameClearWindowCount,
          item.afterTargetFirstClearCount,
          item.currentClearCount,
          item.rawClearCount,
          first.realStartISO || "",
          latest.realStartISO || "",
          first.reportCode ? `${first.reportCode}#${first.fightID}` : "",
          latest.reportCode ? `${latest.reportCode}#${latest.fightID}` : "",
          item.error || ""
        ].map(toCsvValue).join(","));
      }
      return lines.join("\n");
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function saveCredentials() {
      const payload = {
        clientId: $("clientId").value,
        clientSecret: $("clientSecret").value,
        manualToken: $("manualToken").value
      };
      localStorage.setItem(STORE_KEY, JSON.stringify(payload));
      setStatus("凭证已保存到本机浏览器");
    }

    function loadCredentials() {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return;
      try {
        const payload = JSON.parse(raw);
        $("clientId").value = payload.clientId || "";
        $("clientSecret").value = payload.clientSecret || "";
        $("manualToken").value = payload.manualToken || "";
      } catch {
        localStorage.removeItem(STORE_KEY);
      }
    }

    function clearCredentials() {
      localStorage.removeItem(STORE_KEY);
      $("clientId").value = "";
      $("clientSecret").value = "";
      $("manualToken").value = "";
      state.token = "";
      state.rateLimit = null;
      renderRateLimit(null);
      setStatus("凭证已清除");
    }

    async function refreshRateLimitFromButton() {
      try {
        $("refreshRateBtn").disabled = true;
        setStatus("查询额度");
        await refreshRateLimit();
        setStatus("额度已更新");
      } catch (error) {
        setStatus("额度查询失败");
        log(`额度查询失败：${error.message}`);
      } finally {
        $("refreshRateBtn").disabled = false;
      }
    }

    async function run() {
      clearLog();
      state.abortController = new AbortController();
      $("runBtn").disabled = true;
      $("stopBtn").disabled = false;
      $("refreshRateBtn").disabled = true;
      $("downloadJsonBtn").disabled = true;
      $("downloadCsvBtn").disabled = true;

      try {
        const args = readArgs();
        const subject = targetSubject(args);
        setStatus("获取令牌");
        state.token = await getToken();
        log("令牌已就绪。");
        await refreshRateLimit();

        setStatus("查询目标初通");
        const targetResult = await collectCharacterClears(subject, args);
        state.target = targetResult.character;
        state.targetRawClears = targetResult.raw;
        state.targetClears = targetResult.deduped;
        if (!state.targetClears.length) {
          throw new Error(`没有找到 ${state.target.name}@${state.target.server.name} 的通关记录。`);
        }

        const firstClear = state.targetClears[0];
        state.targetFirstClear = firstClear;
        log(`目标初通：${state.target.name}@${state.target.server.name} ${firstClear.realStartISO} ${firstClear.reportCode}#${firstClear.fightID}`);

        setStatus("查询初通队友");
        const firstReport = await queryFirstClearDetail(firstClear, args);
        state.firstClearReport = firstReport;
        const { fight: detailFight, players, teammates } = extractPlayersFromFirstClear(
          firstReport,
          firstClear.fightID,
          state.target,
          args
        );
        state.firstClearPlayers = players;
        log(`初通玩家数 ${players.length}，队友数 ${teammates.length}。`);

        setStatus("统计队友通关次数");
        const teammateResults = await mapLimit(teammates, args.workers, async (teammate, index) => {
          try {
            const result = await countTeammateClears(teammate, args, firstClear.realStartTime);
            log(`队友 ${index + 1}/${teammates.length}: ${teammate.name}@${teammate.serverName} 此前 ${result.previousClearCount}，当前 ${result.currentClearCount}`);
            return result;
          } catch (error) {
            log(`队友 ${index + 1}/${teammates.length}: ${teammate.name}@${teammate.serverName} 查询失败：${error.message}`);
            return {
              ...teammate,
              error: error.message,
              rawClearCount: 0,
              clearCount: null,
              previousClearCount: null,
              sameClearWindowCount: null,
              afterTargetFirstClearCount: null,
              currentClearCount: null,
              firstClear: null,
              latestClear: null,
              clearRefs: []
            };
          }
        });

        state.teammates = teammateResults;
        state.result = buildResult(
          args,
          state.target,
          state.targetRawClears,
          state.targetClears,
          firstClear,
          firstReport,
          detailFight,
          players,
          teammateResults
        );

        renderSummary();
        renderTable();
        $("downloadJsonBtn").disabled = false;
        $("downloadCsvBtn").disabled = false;
        await refreshRateLimit({ silent: true });
        setStatus("完成");
      } catch (error) {
        if (error.name === "AbortError") {
          setStatus("已停止");
          log("已停止。");
        } else {
          setStatus("失败");
          log(`错误：${error.message}`);
          if (String(error.message).includes("Failed to fetch")) {
            log("浏览器可能拦截了跨域请求。");
          }
        }
      } finally {
        $("runBtn").disabled = false;
        $("stopBtn").disabled = true;
        $("refreshRateBtn").disabled = false;
        state.abortController = null;
      }
    }

    function stop() {
      if (state.abortController) state.abortController.abort();
    }

    function bindEvents() {
      $("saveCredentialsBtn").addEventListener("click", saveCredentials);
      $("refreshRateBtn").addEventListener("click", refreshRateLimitFromButton);
      $("clearCredentialsBtn").addEventListener("click", clearCredentials);
      $("runBtn").addEventListener("click", run);
      $("stopBtn").addEventListener("click", stop);
      ["tableSearch", "onlyErrors"].forEach((id) => {
        $(id).addEventListener("input", renderTable);
        $(id).addEventListener("change", renderTable);
      });
      $("sortField").addEventListener("change", () => {
        state.tableSort.key = $("sortField").value;
        renderTable();
      });
      $("sortDirection").addEventListener("change", () => {
        state.tableSort.direction = $("sortDirection").value;
        renderTable();
      });
      $("clearTableFiltersBtn").addEventListener("click", () => {
        $("tableSearch").value = "";
        $("onlyErrors").value = "all";
        state.tableSort = { key: "order", direction: "asc" };
        renderTable();
      });
      document.querySelectorAll(".sort-btn").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.sort;
          if (state.tableSort.key === key) {
            state.tableSort.direction = state.tableSort.direction === "asc" ? "desc" : "asc";
          } else {
            state.tableSort.key = key;
            state.tableSort.direction = ["previousClearCount", "currentClearCount"].includes(key) ? "desc" : "asc";
          }
          renderTable();
        });
      });
      $("downloadJsonBtn").addEventListener("click", () => {
        download("fflogs_初通队友次数对比.json", JSON.stringify(state.result, null, 2), "application/json;charset=utf-8");
      });
      $("downloadCsvBtn").addEventListener("click", () => {
        download("fflogs_初通队友次数对比.csv", "\ufeff" + teammatesToCsv(getVisibleTeammates()), "text/csv;charset=utf-8");
      });
    }

    loadCredentials();
    renderQueries();
    renderSummary();
    renderTable();
    bindEvents();
  </script>
</body>
</html>
